<div class="space-y-6">
    <div class="flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 w-10 h-10 rounded-full flex items-center justify-center">
                <i class="fa fa-cloud-download text-white text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">拉流代理</h2>
        </div>
        <button class="bg-gradient-primary text-white px-6 py-3 rounded-lg font-semibold hover:shadow-neon transition-all duration-300 hover:-translate-y-1" onclick="openAddPullProxyModal()">
            <i class="fa fa-plus mr-2"></i>新增拉流代理
        </button>
    </div>

    <div class="bg-white/5 rounded-xl p-6 shadow-lg border border-white/10">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="border-b border-white/10">
                        <th class="text-left py-4 px-4 text-white font-semibold">ID</th>
                        <th class="text-left py-4 px-4 text-white font-semibold">虚拟主机</th>
                        <th class="text-left py-4 px-4 text-white font-semibold">应用</th>
                        <th class="text-left py-4 px-4 text-white font-semibold">流ID</th>
                        <th class="text-left py-4 px-4 text-white font-semibold">拉流地址</th>
                        <th class="text-left py-4 px-4 text-white font-semibold">备注</th>
                        <th class="text-left py-4 px-4 text-white font-semibold">按需</th>
                        <th class="text-left py-4 px-4 text-white font-semibold">创建时间</th>
                        <th class="text-left py-4 px-4 text-white font-semibold">操作</th>
                    </tr>
                </thead>
                <tbody id="pullProxyTableBody">
                    <tr>
                        <td colspan="9" class="p-10 text-center">
                            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary mx-auto mb-4"></div>
                            <span class="text-white/60 font-semibold">加载中...</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- 分页 -->
        <div id="pullProxyPagination" class="flex items-center justify-between mt-4 pt-4 border-t border-white/10 hidden">
            <span id="pullProxyPageInfo" class="text-white/50 text-sm"></span>
            <div class="flex items-center gap-2">
                <button id="pullProxyPrevBtn"
                    class="px-3 py-1 rounded-lg bg-white/10 text-white text-sm font-semibold hover:bg-white/20 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fa fa-chevron-left"></i>
                </button>
                <div id="pullProxyPageBtns" class="flex gap-1"></div>
                <button id="pullProxyNextBtn"
                    class="px-3 py-1 rounded-lg bg-white/10 text-white text-sm font-semibold hover:bg-white/20 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fa fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>
